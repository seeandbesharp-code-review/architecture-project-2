services:
  redis:
    image: redis:alpine
    container_name: chinesesale-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  webapi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chinesesale-webapi
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      Redis__Configuration: redis:6379
      Redis__Enabled: "true"
      Redis__TtlMinutes: "10"
    depends_on:
      - redis
    restart: unless-stopped
